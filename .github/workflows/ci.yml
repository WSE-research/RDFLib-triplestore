# CI for RDFLib-triplestore.
# Unit + e2e tests gate every PR and push; the Docker image build is validated
# (no push) once the tests pass.
name: CI

on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check app.py tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Unit tests with coverage gate
        run: |
          pytest tests/unit \
            --cov=app --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=90 --junitxml=pytest-report.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: End-to-end app boot test
        run: pytest tests/e2e -m e2e -v

  docker-build:
    # Validate the image still builds once tests pass (no push configured here).
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build the Docker image (no push)
        run: docker build . --file Dockerfile --tag rdflib-triplestore:ci
